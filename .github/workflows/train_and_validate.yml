name: Train and Validate (Milestone 3)

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  train-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train model (MLflow sqlite)
        id: train
        run: |
          RUN_ID=$(python train.py --tracking-uri sqlite:///mlflow.db --C 1.0)
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Run id: $RUN_ID"

      - name: Validate model (quality gate)
        run: |
          python model_validation.py --tracking-uri sqlite:///mlflow.db --run-id $RUN_ID --min-accuracy 0.90 --min-f1 0.85
